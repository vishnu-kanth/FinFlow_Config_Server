server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

springdoc:
  api-docs:
    path: /auth/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
